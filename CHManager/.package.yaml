author: Nuno Aguiar
scripts:
  preerase: ''
  posterase: ''
  preinstall: ''
  postinstall: |
    print("Using CHManager")
    print("---------------")
    print()
    print("  1) TUI usage/help:")
    print("       opack exec CHManager -jobhelp")
    print("       opack exec CHManager")
    print()
    print("  2) Web interface:")
    print("       ojob CHManager/CHManager-web.yaml")
    print("       ch-manager-web onport=8090 [libs=@MyOPack/channels.js]")
    print()
    print("  3) Optional Unix aliases to run CHManager quickly:")
    print("       Bash: echo 'alias ch-manager=\"opack exec CHManager\"' >> ~/.bashrc && . ~/.bashrc")
    print("             echo 'alias ch-manager-web=\"ojob CHManager-web.yaml\"' >> ~/.bashrc && . ~/.bashrc")
    print("       Zsh:  echo 'alias ch-manager=\"opack exec CHManager\"' >> ~/.zshrc && . ~/.zshrc")
    print("             echo 'alias ch-manager-web=\"ojob CHManager-web.yaml\"' >> ~/.zshrc && . ~/.zshrc")
    print("       sh:   echo 'alias ch-manager=\"opack exec CHManager\"' >> ~/.profile && . ~/.profile")
    print("             echo 'alias ch-manager-web=\"ojob CHManager-web.yaml\"' >> ~/.profile && . ~/.profile")
    print("     Or create portable wrappers:")
    print("       mkdir -p ~/bin && printf '#!/usr/bin/env sh\\nopack exec CHManager \"$@\"\\n' > ~/bin/ch-manager && chmod +x ~/bin/ch-manager")
    print("       mkdir -p ~/bin && printf '#!/usr/bin/env sh\\nojob CHManager-web.yaml \"$@\"\\n' > ~/bin/ch-manager-web && chmod +x ~/bin/ch-manager-web")
    print("       Ensure ~/bin is on your PATH")
    print()
    print("See README.md for commands and examples.")
    print()
