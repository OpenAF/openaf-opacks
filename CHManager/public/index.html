<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHManager – OpenAF Channel Manager</title>
<link rel="stylesheet" href="/css/nJSMap.css">
<style>
  :root {
    --bg: #0f1115; --bg2: #181b22; --bg3: #1e222c;
    --border: #2c3140; --text: #d0d6e0; --dim: #6b7280;
    --accent: #da9fff; --ok: #5ccea0; --err: #ff6b6b;
    --type: #56d0f5; --badge: #f0c040; --num: #9de38c;
    --hover: #252a38;
  }
  [data-theme=light] {
    --bg: #f4f5f7; --bg2: #ffffff; --bg3: #e8ebf0;
    --border: #c8cdd8; --text: #1a202c; --dim: #6b7280;
    --accent: #7c3aed; --ok: #16a34a; --err: #dc2626;
    --type: #0369a1; --badge: #b45309; --num: #15803d;
    --hover: #e2e6ef;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Cascadia Code','Consolas','Fira Code',monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; }

  /* ── Top bar ─────────────────────────────────────────────────────── */
  #topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  #topbar h1 { font-size: 15px; color: var(--accent); font-weight: 600; margin-right: auto; }
  #topbar h1 span { color: var(--dim); font-weight: 400; font-size: 12px; margin-left: 8px; }
  #top-selected-size { color: var(--badge) !important; }
  #mobile-menu-btn { display: none; }
  .btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }
  .btn:hover { background: var(--hover); }
  .btn-ok { border-color: var(--ok); color: var(--ok); }
  .btn-err { border-color: var(--err); color: var(--err); }

  /* ── Layout ──────────────────────────────────────────────────────── */
  #layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ─────────────────────────────────────────────────────── */
  #sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar-header { padding: 8px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
  #sidebar-header span { color: var(--dim); font-size: 11px; flex: 1; }
  #ch-list { flex: 1; overflow-y: auto; }
  .ch-item { padding: 7px 10px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }
  .ch-item:hover { background: var(--hover); }
  .ch-item.active { background: var(--hover); border-left: 2px solid var(--accent); }
  .ch-item .ch-name { color: var(--text); font-weight: 500; }
  .ch-item .ch-meta { font-size: 11px; display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg3); border: 1px solid var(--border); }
  .badge-type { color: var(--type); border-color: var(--type); }
  .badge-open { color: var(--ok); border-color: var(--ok); }
  .badge-closed { color: var(--dim); }
  .badge-exp { color: var(--badge); border-color: var(--badge); }
  .badge-peer { color: var(--badge); border-color: var(--badge); }

  /* ── Main area ───────────────────────────────────────────────────── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #main-header { padding: 8px 14px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  #ch-title { font-size: 14px; color: var(--accent); font-weight: 600; flex: 1; }
  #ch-subtitle { font-size: 11px; color: var(--dim); }

  /* ── Tabs ────────────────────────────────────────────────────────── */
  #tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 14px; flex-shrink: 0; }
  .tab { padding: 6px 14px; cursor: pointer; color: var(--dim); border-bottom: 2px solid transparent; font-size: 12px; }
  .tab.active { color: var(--accent); border-color: var(--accent); }
  .tab:hover { color: var(--text); }

  /* ── Content panels ──────────────────────────────────────────────── */
  #content { flex: 1; overflow-y: auto; padding: 12px 14px; }

  /* ── Tables ──────────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: var(--bg3); color: var(--dim); text-align: left; padding: 5px 8px; border: 1px solid var(--border); position: sticky; top: 0; }
  td { padding: 4px 8px; border: 1px solid var(--border); vertical-align: top; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  tr:hover td { background: var(--hover); }
  .key-cell { color: var(--num); font-size: 11px; max-width: 200px; }
  .val-cell { color: var(--text); }
  .num-cell { color: var(--dim); text-align: right; width: 40px; }

  /* ── Pagination ──────────────────────────────────────────────────── */
  #pagination { display: flex; gap: 8px; align-items: center; padding: 8px 0; font-size: 12px; color: var(--dim); }
  #pagination .btn { padding: 2px 8px; }

  /* ── Ops panel ───────────────────────────────────────────────────── */
  .ops-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 700px; }
  .ops-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
  .ops-card h3 { font-size: 12px; color: var(--accent); margin-bottom: 8px; }
  .ops-card p { font-size: 11px; color: var(--dim); margin-bottom: 8px; }
  .field-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .field-row label { font-size: 11px; color: var(--dim); width: 90px; flex-shrink: 0; }
  .field-row input, .field-row select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 3px; font-size: 12px; font-family: inherit; flex: 1; }

  /* ── Live view ───────────────────────────────────────────────────── */
  #live-config { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
  .live-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 8px; min-width: 220px; }
  .live-box h4 { color: var(--accent); font-size: 12px; margin-bottom: 6px; }
  .live-box select { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 4px 6px; border-radius: 4px; font-size: 12px; }
  #live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 10px; }
  .live-grid-cell { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .live-grid-head { padding: 8px; border-bottom: 1px solid var(--border); color: var(--badge); font-size: 12px; font-weight: 700; }
  .live-log { font-size: 11px; max-height: calc(100vh - 340px); overflow-y: auto; }
  .live-entry { padding: 4px 8px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .live-ts { color: var(--dim); flex-shrink: 0; }
  .live-op { color: var(--badge); width: 60px; flex-shrink: 0; }
  .live-key { color: var(--num); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .live-val { color: var(--dim); flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Modal ───────────────────────────────────────────────────────── */
  #modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
  #modal-bg.visible { display: flex; }
  #modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; width: 560px; max-height: 85vh; overflow-y: auto; padding: 20px 24px; }
  #modal h2 { font-size: 15px; color: var(--accent); margin-bottom: 14px; }
  .modal-field { margin-bottom: 10px; }
  .modal-field label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 3px; }
  .modal-field input, .modal-field select, .modal-field textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 12px; font-family: inherit; }
  .modal-field textarea { resize: vertical; min-height: 80px; }
  .modal-field input.required { border-color: var(--badge); }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
  .format-tabs { display: flex; gap: 6px; margin: 6px 0 8px; flex-wrap: wrap; }
  .format-tabs .btn.active { border-color: var(--accent); color: var(--accent); background: var(--hover); }
  .data-pre { color: var(--text); font-size: 12px; padding: 8px; background: var(--bg3); border-radius: 4px; overflow-x: auto; line-height: 1.45; }
  .njsmap-host, .tree-editor { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 12px; overflow: auto; }
  .viewer-full { height: calc(100vh - 280px); min-height: 340px; }
  .tree-pre { white-space: pre; overflow: auto; line-height: 1.45; }
  .pt-line { color: var(--text); }
  .pt-key { color: var(--text); font-weight: 700; }
  .pt-sep { color: var(--dim); }
  .pt-str { color: var(--type); }
  .pt-num { color: var(--num); }
  .pt-bool { color: var(--err); }
  .pt-null, .pt-def { color: var(--badge); }
  .tree-row { display: flex; gap: 6px; align-items: center; min-height: 26px; border-left: 1px solid var(--border); margin-left: 8px; padding-left: 8px; }
  .tree-key { color: var(--num); min-width: 90px; }
  .tree-type { color: var(--type); font-size: 10px; text-transform: uppercase; }
  .tree-prim { color: var(--text); word-break: break-word; }
  .tree-empty { color: var(--dim); font-style: italic; }
  .tree-editor input, .tree-editor select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 3px 5px; border-radius: 3px; font-family: inherit; font-size: 11px; }
  .tree-editor .tree-key-in { width: 120px; color: var(--num); }
  .tree-editor .tree-val-in { flex: 1; min-width: 140px; }
  .tree-editor .tree-actions { display: flex; gap: 4px; margin: 6px 0 6px 16px; }
  .option-grid { display: grid; gap: 8px; margin-bottom: 10px; }
  .option-row { display: grid; grid-template-columns: 140px 1fr; gap: 8px; align-items: start; }
  .option-meta { color: var(--dim); font-size: 10px; line-height: 1.35; margin-top: 2px; }
  .option-name { color: var(--num); font-size: 11px; padding-top: 5px; word-break: break-word; }
  .option-name .req { color: var(--err); }
  .type-help { color: var(--dim); font-size: 11px; line-height: 1.45; margin: 6px 0 10px; }
  .opts-section { margin-top: 10px; border: 1px solid var(--border); border-radius: 4px; padding: 8px; }
  .opts-section summary { cursor: pointer; font-size: 11px; color: var(--dim); }
  .opts-section details[open] summary { color: var(--accent); }

  /* ── Value editor modal ──────────────────────────────────────────── */
  #val-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 110; align-items: center; justify-content: center; }
  #val-modal-bg.visible { display: flex; }
  #val-modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; width: 700px; max-height: 85vh; overflow-y: auto; padding: 20px 24px; }
  #val-modal h2 { font-size: 14px; color: var(--accent); margin-bottom: 10px; }
  #val-key-display { font-size: 11px; color: var(--num); margin-bottom: 8px; }
  #val-editor { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; font-family: inherit; font-size: 12px; min-height: 200px; resize: vertical; }
  .val-actions { display: flex; gap: 8px; margin-top: 10px; }
  #val-error { color: var(--err); font-size: 11px; margin-top: 4px; display: none; }

  /* ── Toasts ──────────────────────────────────────────────────────── */
  #toast-area { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 6px; }
  .toast { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-size: 12px; animation: fadeIn .2s; max-width: 320px; }
  .toast-ok  { border-color: var(--ok);  color: var(--ok); }
  .toast-err { border-color: var(--err); color: var(--err); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  #empty-state { color: var(--dim); text-align: center; padding: 40px; font-size: 13px; }
  #empty-state kbd { background: var(--bg3); border: 1px solid var(--border); padding: 2px 6px; border-radius: 3px; }

  @media (max-width: 900px) {
    body { font-size: 14px; }
    #topbar { flex-wrap: wrap; gap: 8px; padding: 8px 10px; }
    #mobile-menu-btn { display: inline-block; }
    #topbar h1 { width: 100%; margin-right: 0; order: -1; }
    #topbar h1 span { display: inline; }
    #layout { position: relative; }
    #sidebar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: min(82vw, 320px);
      transform: translateX(-100%);
      transition: transform .2s ease;
      z-index: 30;
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
    }
    #layout.mobile-sidebar-open #sidebar { transform: translateX(0); }
    #layout.mobile-sidebar-open::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 20;
    }
    #main-header { flex-wrap: wrap; padding: 8px 10px; }
    #ch-title { width: 100%; }
    #tabs {
      overflow-x: auto;
      white-space: nowrap;
      padding: 0 8px;
      -webkit-overflow-scrolling: touch;
    }
    .tab { padding: 8px 12px; font-size: 13px; }
    #content { padding: 10px; }
    #panel-keys, #panel-values, #panel-ops, #panel-live, #panel-def { overflow-x: auto; }
    table { min-width: 620px; }
    .ops-grid { grid-template-columns: 1fr; max-width: none; }
    .field-row { flex-wrap: wrap; }
    .field-row label { width: 100%; }
    #live-config { gap: 10px; }
    .live-box { min-width: 0; width: 100%; }
    #live-grid { grid-template-columns: 1fr; }
    .viewer-full { height: calc(100vh - 340px); min-height: 260px; }
    #modal, #val-modal {
      width: calc(100vw - 16px);
      max-width: calc(100vw - 16px);
      padding: 14px;
      max-height: 92vh;
    }
    .option-row { grid-template-columns: 1fr; }
    .tree-editor .tree-key-in, .tree-editor .tree-val-in { width: 100%; min-width: 0; }
    #toast-area { left: 10px; right: 10px; bottom: 10px; }
    .toast { max-width: none; }
  }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <button class="btn" id="mobile-menu-btn" onclick="toggleMobileSidebar()">☰ Channels</button>
  <h1>CHManager <span>OpenAF Channel Manager</span><span id="top-selected-size"></span></h1>
  <button class="btn btn-ok" onclick="openAddModal()">＋ Add Channel</button>
  <button class="btn" onclick="refreshAll()">⟳ Refresh</button>
  <button class="btn" onclick="toggleTheme()">◑ Theme</button>
</div>

<!-- Layout -->
<div id="layout">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span id="sidebar-count">0 channels</span>
      <button class="btn" style="padding:2px 6px;font-size:11px" onclick="openAddModal()">＋</button>
    </div>
    <div id="ch-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="main-header">
      <div id="ch-title">Select a channel</div>
      <div id="ch-subtitle"></div>
      <button class="btn btn-ok" id="btn-open"    style="display:none" onclick="openChannel()">Open</button>
      <button class="btn btn-err" id="btn-close"  style="display:none" onclick="closeChannel()">Close</button>
      <button class="btn" id="btn-edit"            style="display:none" onclick="openEditModal()">Edit</button>
      <button class="btn btn-err" id="btn-delete"  style="display:none" onclick="deleteChannel()">Delete</button>
    </div>
    <div id="tabs">
      <div class="tab active" onclick="showTab('keys')"     id="tab-keys">Keys</div>
      <div class="tab"        onclick="showTab('values')"   id="tab-values">Values</div>
      <div class="tab"        onclick="showTab('ops')"      id="tab-ops">Operations</div>
      <div class="tab"        onclick="showTab('live')"     id="tab-live">Live</div>
      <div class="tab"        onclick="showTab('def')"      id="tab-def">Definition</div>
    </div>
    <div id="content">
      <div id="empty-state">Select a channel in the sidebar or click <kbd>＋ Add Channel</kbd></div>
      <div id="panel-keys"   style="display:none"></div>
      <div id="panel-values" style="display:none"></div>
      <div id="panel-ops"    style="display:none"></div>
      <div id="panel-live"   style="display:none">
        <div id="live-config">
          <div class="live-box">
            <h4>Open Channels</h4>
            <select id="live-open" size="6"></select>
            <div class="field-row" style="margin-top:8px"><button class="btn btn-ok" onclick="liveSubscribeSelected()">Subscribe</button></div>
          </div>
          <div class="live-box">
            <h4>Subscribed Channels</h4>
            <select id="live-subs" size="6"></select>
            <div class="field-row" style="margin-top:8px"><button class="btn btn-err" onclick="liveUnsubscribeSelected()">Unsubscribe</button></div>
          </div>
        </div>
        <div id="live-grid"></div>
      </div>
      <div id="panel-def"    style="display:none"></div>
    </div>
  </div>
</div>

<!-- Add/Edit channel modal -->
<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h2 id="modal-title">Add Channel</h2>
    <div class="modal-field">
      <label>Name <span style="color:var(--err)">*</span></label>
      <input id="mf-name" class="required" placeholder="my-channel" />
    </div>
    <div class="modal-field">
      <label>Type <span style="color:var(--err)">*</span></label>
      <select id="mf-type" onchange="onTypeChange()"></select>
    </div>
    <div class="modal-field">
      <label><input type="checkbox" id="mf-autoopen"> Auto-open on startup</label>
    </div>
    <div id="opts-required" class="opts-section" style="display:none">
      <details open><summary>Required options</summary><div id="opts-required-fields"></div></details>
    </div>
    <div id="opts-optional" class="opts-section" style="display:none;margin-top:8px">
      <details><summary>Optional options</summary><div id="opts-optional-fields"></div></details>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-ok" onclick="saveChannel()">Save</button>
    </div>
  </div>
</div>

<!-- Value editor modal -->
<div id="val-modal-bg" onclick="if(event.target===this)closeValModal()">
  <div id="val-modal">
    <h2 id="val-modal-title">Set Value</h2>
    <div id="val-key-display"></div>
    <div class="modal-field"><label>Key (JSON or SLON)</label><input id="val-key-in" /></div>
    <div class="modal-field">
      <label>Value (JSON, SLON, or visual)</label>
      <div class="format-tabs">
        <button class="btn active" id="btn-val-text" onclick="setValEditorMode('text')">Text</button>
        <button class="btn" id="btn-val-visual" onclick="setValEditorMode('visual')">Visual</button>
      </div>
      <textarea id="val-editor"></textarea>
      <div id="val-visual" class="tree-editor" style="display:none"></div>
    </div>
    <div id="val-error"></div>
    <div class="val-actions">
      <button class="btn" onclick="formatValEditor('json')">JSON</button>
      <button class="btn" onclick="formatValEditor('slon')">SLON</button>
      <button class="btn" onclick="closeValModal()">Cancel</button>
      <button class="btn btn-ok" onclick="saveVal()">Save</button>
    </div>
  </div>
</div>

<!-- Toast area -->
<div id="toast-area"></div>

<script src="/js/openafsigil.js"></script>
<script src="/js/njsmap.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────────────────
var _selected   = null
var _defs       = []
var _types      = []
var _keyPage    = 1
var _valPage    = 1
var _keyTotal   = 0
var _valTotal   = 0
var _pageSize   = 50
var _editMode   = false
var _valEditKey = null
var _sseSource  = null
var _liveActive = false
var _liveCount  = 0
var _liveState  = { openChannels: [], subscribed: [] }
var _liveEvents = {}
var _defViewMode = "json"
var _keysViewMode = "table"
var _valsViewMode = "table"
var _selectedSize = null
var _valEditorMode = "text"
var _valEditorData = {}
var _optsEditorMode = "text"
var _optsEditorData = {}
var _treeEditors = {}
var _optionFieldData = {}
var _listRefreshCfg = {
  keys  : { mode: "off", seconds: 3, reverse: false, lastAt: 0, lastTotal: null, nextSeconds: 0 },
  values: { mode: "off", seconds: 3, reverse: false, lastAt: 0, lastTotal: null, nextSeconds: 0 }
}
var _listRefreshTimers = { keys: null, values: null }

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", function() {
  loadTypes().then(function() {
    refreshAll()
  })
  // Start SSE
  startSSE()
  bindResponsiveUi()
})

function toggleTheme() {
  var t = document.documentElement.getAttribute("data-theme")
  document.documentElement.setAttribute("data-theme", t === "light" ? "" : "light")
}

// ── API helpers ──────────────────────────────────────────────────────────────
function api(method, path, body) {
  return fetch("/api" + path, {
    method: method,
    headers: body ? { "Content-Type": "application/json" } : {},
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || r.statusText) })
    return r.json()
  })
}

function loadTypes() {
  return api("GET", "/types").then(function(t) {
    _types = t
    var sel = document.getElementById("mf-type")
    sel.innerHTML = ""
    t.forEach(function(ty) {
      var o = document.createElement("option")
      o.value = ty.type
      o.textContent = ty.type + (ty.opack !== "(built-in)" ? " [" + ty.opack + "]" : "") + (ty.available ? "" : " ✘")
      if (!ty.available) o.style.color = "var(--err)"
      sel.appendChild(o)
    })
  })
}

function refreshAll() {
  api("GET", "/channels").then(function(defs) {
    _defs = defs
    renderSidebar()
    if (_selected) {
      var found = defs.find(function(d) { return d.name === _selected })
      if (!found) { _selected = null; renderMain() }
      else renderMain()
    }
  }).catch(function(e) { toast("Refresh failed: " + e.message, "err") })
}

function bindResponsiveUi() {
  var layout = document.getElementById("layout")
  var main = document.getElementById("main")
  if (!layout) return
  layout.addEventListener("click", function(ev) {
    if (!layout.classList.contains("mobile-sidebar-open")) return
    if (ev.target !== layout) return
    closeMobileSidebar()
  })
  if (main) {
    main.addEventListener("click", function() {
      if (window.innerWidth <= 900) closeMobileSidebar()
    })
  }
  window.addEventListener("resize", function() {
    if (window.innerWidth > 900) closeMobileSidebar()
  })
}

function toggleMobileSidebar() {
  var layout = document.getElementById("layout")
  if (!layout) return
  layout.classList.toggle("mobile-sidebar-open")
}

function closeMobileSidebar() {
  var layout = document.getElementById("layout")
  if (!layout) return
  layout.classList.remove("mobile-sidebar-open")
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  var list = document.getElementById("ch-list")
  document.getElementById("sidebar-count").textContent = _defs.length + " channel" + (_defs.length === 1 ? "" : "s")
  list.innerHTML = ""
  _defs.forEach(function(d) {
    var el = document.createElement("div")
    el.className = "ch-item" + (d.name === _selected ? " active" : "")
    el.onclick = function() { selectChannel(d.name) }
    var badges = '<span class="badge badge-type">' + d.type + '</span>'
    if (d.isOpen)    badges += '<span class="badge badge-open">● open</span>'
    else             badges += '<span class="badge badge-closed">○ closed</span>'
    if (d.isExposed) badges += '<span class="badge badge-exp">↑ exp</span>'
    if (d.isPeered)  badges += '<span class="badge badge-peer">⇄ peer</span>'
    if (d.autoOpen)  badges += '<span class="badge">⚙ auto</span>'
    el.innerHTML = '<div class="ch-name">' + esc(d.name) + '</div><div class="ch-meta">' + badges + '</div>'
    list.appendChild(el)
  })
}

function selectChannel(name) {
  _selected = name
  _keyPage  = 1
  _valPage  = 1
  resetListRefreshStats("keys")
  resetListRefreshStats("values")
  renderSidebar()
  renderMain()
  closeMobileSidebar()
}

// ── Main area ─────────────────────────────────────────────────────────────────
var _curTab = "keys"

function showTab(tab) {
  _curTab = tab
  stopListRefresh("keys")
  stopListRefresh("values")
  ;["keys","values","ops","live","def"].forEach(function(t) {
    document.getElementById("tab-" + t).className    = "tab" + (t === tab ? " active" : "")
    document.getElementById("panel-" + t).style.display = t === tab ? "block" : "none"
  })
  document.getElementById("empty-state").style.display = "none"
  if (tab === "keys")   loadKeys()
  if (tab === "values") loadValues()
  if (tab === "ops")    renderOps()
  if (tab === "def")    renderDef()
  if (tab === "live") {
    if (!_liveActive) startLive()
    renderLive()
  }
}

function renderMain() {
  var d = _defs.find(function(x) { return x.name === _selected })
  if (!d) {
    document.getElementById("ch-title").textContent    = "Select a channel"
    document.getElementById("ch-subtitle").textContent = ""
    document.getElementById("top-selected-size").textContent = ""
    document.getElementById("empty-state").style.display = "block"
    ;["keys","values","ops","live","def"].forEach(function(t) { document.getElementById("panel-" + t).style.display = "none" })
    document.getElementById("btn-open").style.display    = "none"
    document.getElementById("btn-close").style.display   = "none"
    document.getElementById("btn-edit").style.display    = "none"
    document.getElementById("btn-delete").style.display  = "none"
    return
  }
  document.getElementById("ch-title").textContent    = d.name
  document.getElementById("ch-subtitle").textContent = d.type + (d.isOpen ? " · open" : " · closed")
  document.getElementById("btn-open").style.display    = d.isOpen ? "none" : "inline-block"
  document.getElementById("btn-close").style.display   = d.isOpen ? "inline-block" : "none"
  document.getElementById("btn-edit").style.display    = "inline-block"
  document.getElementById("btn-delete").style.display  = "inline-block"
  document.getElementById("empty-state").style.display = "none"

  showTab(_curTab)
}

// ── Keys panel ───────────────────────────────────────────────────────────────
function loadKeys() {
  if (!_selected) return
  var d = _defs.find(function(x) { return x.name === _selected })
  if (!d || !d.isOpen) {
    document.getElementById("panel-keys").innerHTML = '<p style="color:var(--dim);padding:20px">Channel is not open. Click <b>Open</b> to activate it.</p>'; return

  loadPagedList("keys", _keyPage, _pageSize)
    .then(function(res) {
      _keyTotal = res.total
      applySelectedSize(res.total)
      updateListRefreshStats("keys", res.total)

      armListRefresh("keys")
    }).catch(function(e) {
      stopListRefresh("keys")
      document.getElementById("panel-keys").innerHTML = '<p style="color:var(--err);padding:20px">Error: ' + esc(e.message) + '</p>'
    })
}

function renderKeysTable(keys, total, page) {
  var pages = Math.ceil(total / _pageSize) || 1

  html += '<button class="btn' + (_keysViewMode === "table" ? " active" : "") + '" onclick="setKeysViewMode(\'table\')">Table</button>'
  html += '<button class="btn' + (_keysViewMode === "tree" ? " active" : "") + '" onclick="setKeysViewMode(\'tree\')">Tree</button>'
  html += '<button class="btn' + (_keysViewMode === "flat" ? " active" : "") + '" onclick="setKeysViewMode(\'flat\')">Flat</button>'
  html += '<button class="btn' + (_keysViewMode === "visual" ? " active" : "") + '" onclick="setKeysViewMode(\'visual\')">Visual</button>'

  html += renderRefreshControls("keys")

    html += '<div class="data-pre tree-pre viewer-full">' + renderAsciiTreeHtml(keys) + '</div>'

      var kenc = encodeURIComponent(ks)

      html += '<td><button class="btn" style="font-size:10px;padding:1px 5px" onclick="unsetKeyEnc(\'' + kenc + '\')">✕</button></td>'
      html += '</tr>'

    html += '</table>'
  }
  html += renderPager(page, pages, total, "keys")
  document.getElementById("panel-keys").innerHTML = html

function setKeysViewMode(mode) {
  _keysViewMode = mode
  loadKeys()
}

function clickKeyEnc(keyEnc) {
  clickKey(decodeURIComponent(keyEnc))
}

function clickKey(keyStr) {
  api("GET", "/channels/" + enc(_selected) + "/get?key=" + encodeURIComponent(keyStr))

function unsetKeyEnc(keyEnc) {

}

function unsetKey(keyStr) {
  if (!confirm("Remove key " + keyStr + "?")) return
  api("DELETE", "/channels/" + enc(_selected) + "/unset?key=" + encodeURIComponent(keyStr))
    .then(function() { toast("Key removed"); loadKeys() })
    .catch(function(e) { toast(e.message, "err") })

function openNewValModal() {

}

// ── Values panel ─────────────────────────────────────────────────────────────
function loadValues() {
  if (!_selected) return

  } else if (_valsViewMode === "flat") {

function setValsViewMode(mode) {
  _valsViewMode = mode
  loadValues()
}

function openValFromEnc(valEnc) {
  try {
    openValModal(null, JSON.parse(decodeURIComponent(valEnc)))
  } catch(e) {
    toast("Value decode error: " + e.message, "err")
  }
}

function renderPager(page, pages, total, which) {
  if (pages <= 1) return '<div class="pagination" style="color:var(--dim);font-size:11px;padding:6px 0">' + total + ' entries</div>'
  var html = '<div id="pagination">'
  html += '<button class="btn" onclick="changePageTo(\'' + which + '\',1)" ' + (page <= 1 ? "disabled" : "") + '>⏮</button>'
  html += '<button class="btn" onclick="changePage(\'' + which + '\',-1)" ' + (page <= 1 ? "disabled" : "") + '>◀</button>'
  html += '<span>Page ' + page + ' / ' + pages + ' (' + total + ' entries)</span>'
  html += '<button class="btn" onclick="changePage(\'' + which + '\',1)" ' + (page >= pages ? "disabled" : "") + '>▶</button>'
  html += '<button class="btn" onclick="changePageTo(\'' + which + '\',' + pages + ')" ' + (page >= pages ? "disabled" : "") + '>⏭</button>'
  html += '</div>'
  return html
}

function changePage(which, delta) {
  if (which === "keys") {
    _keyPage = Math.max(1, _keyPage + delta); loadKeys()
  } else {
    _valPage = Math.max(1, _valPage + delta); loadValues()
  }
}

function changePageTo(which, page) {
  if (which === "keys") {
    _keyPage = Math.max(1, page); loadKeys()
  } else {
    _valPage = Math.max(1, page); loadValues()
  }
}

function resetListRefreshStats(which) {
  var cfg = _listRefreshCfg[which]
  cfg.lastAt = 0
  cfg.lastTotal = null
  cfg.nextSeconds = 0
}

function stopListRefresh(which) {
  if (_listRefreshTimers[which]) clearTimeout(_listRefreshTimers[which])
  _listRefreshTimers[which] = null
}

function getListRefreshSeconds(which) {
  var cfg = _listRefreshCfg[which]
  if (cfg.mode === "fixed") return Math.max(1, parseInt(cfg.seconds) || 3)
  if (cfg.mode === "auto") return Math.max(1, parseInt(cfg.nextSeconds) || 3)
  return 0
}

function updateListRefreshStats(which, total) {
  var cfg = _listRefreshCfg[which]
  var nowMs = Date.now()
  if (cfg.mode === "auto") {
    if (cfg.lastAt && cfg.lastTotal !== null) {
      var dt = Math.max(0.2, (nowMs - cfg.lastAt) / 1000)
      var rate = Math.abs(total - cfg.lastTotal) / dt
      if (rate >= 50) cfg.nextSeconds = 1
      else if (rate >= 15) cfg.nextSeconds = 2
      else if (rate >= 5) cfg.nextSeconds = 3
      else if (rate >= 1.5) cfg.nextSeconds = 5
      else cfg.nextSeconds = 8
    } else {
      cfg.nextSeconds = 3
    }
  }
  cfg.lastAt = nowMs
  cfg.lastTotal = total
}

function armListRefresh(which) {
  stopListRefresh(which)
  if (_curTab !== which) return
  var sec = getListRefreshSeconds(which)
  if (sec <= 0) return
  _listRefreshTimers[which] = setTimeout(function() {
    if (which === "keys") loadKeys()
    else loadValues()
  }, sec * 1000)
}

function renderRefreshControls(which) {
  var cfg = _listRefreshCfg[which]
  var modeLabel = cfg.mode === "auto" ? ("auto (" + getListRefreshSeconds(which) + "s)") : cfg.mode
  var html = '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">'
  html += '<span style="color:var(--dim);font-size:11px">Refresh</span>'
  html += '<select id="' + which + '-rf-mode" onchange="applyListRefreshControls(\'' + which + '\')" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 5px;border-radius:4px;font-size:11px">'
  html += '<option value="off"' + (cfg.mode === "off" ? " selected" : "") + '>off</option>'
  html += '<option value="fixed"' + (cfg.mode === "fixed" ? " selected" : "") + '>fixed</option>'
  html += '<option value="auto"' + (cfg.mode === "auto" ? " selected" : "") + '>auto</option>'
  html += '</select>'
  html += '<input id="' + which + '-rf-sec" type="number" min="1" value="' + cfg.seconds + '" onchange="applyListRefreshControls(\'' + which + '\')" style="width:70px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 5px;border-radius:4px;font-size:11px" />'
  html += '<span style="color:var(--dim);font-size:11px">sec</span>'
  html += '<label style="color:var(--dim);font-size:11px"><input id="' + which + '-rf-rev" type="checkbox" ' + (cfg.reverse ? "checked" : "") + ' onchange="applyListRefreshControls(\'' + which + '\')" /> reverse (newest first)</label>'
  html += '<span style="color:var(--badge);font-size:11px">mode: ' + modeLabel + '</span>'
  html += '</div>'
  return html
}

function applyListRefreshControls(which) {
  var cfg = _listRefreshCfg[which]
  var modeEl = document.getElementById(which + "-rf-mode")
  var secEl  = document.getElementById(which + "-rf-sec")
  var revEl  = document.getElementById(which + "-rf-rev")
  if (!modeEl || !secEl || !revEl) return
  cfg.mode = modeEl.value
  cfg.seconds = Math.max(1, parseInt(secEl.value) || 3)
  cfg.reverse = revEl.checked === true
  resetListRefreshStats(which)
  if (which === "keys") {
    _keyPage = 1
    loadKeys()
  } else {
    _valPage = 1
    loadValues()
  }
}

function computeRowNumber(which, i, page, total) {
  var cfg = _listRefreshCfg[which]
  if (cfg.reverse) return total - ((page - 1) * _pageSize) - i
  return (page - 1) * _pageSize + i + 1
}

function loadPagedList(which, uiPage, pageSize) {
  var cfg = _listRefreshCfg[which]
  var base = "/channels/" + enc(_selected) + "/" + (which === "keys" ? "keys" : "values")
  return api("GET", base + "?page=" + uiPage + "&size=" + pageSize).then(function(res) {
    var total = res.total || 0
    var pages = Math.max(1, Math.ceil(total / pageSize))
    var sourcePage = uiPage
    if (cfg.reverse) sourcePage = Math.max(1, pages - uiPage + 1)
    if (!cfg.reverse || sourcePage === uiPage) {
      var arr = (which === "keys" ? (res.keys || []) : (res.values || [])).slice()
      if (cfg.reverse) arr.reverse()
      return { items: arr, total: total, page: uiPage, pages: pages }
    }
    return api("GET", base + "?page=" + sourcePage + "&size=" + pageSize).then(function(res2) {
      var arr2 = (which === "keys" ? (res2.keys || []) : (res2.values || [])).slice()
      arr2.reverse()
      return { items: arr2, total: res2.total || total, page: uiPage, pages: pages }
    })
  })
}

function toHttpPathSample(s) {
  return "/" + String(s || "ch").trim().replace(/\s+/g, "-")
}

function doExpose() {
  var port = parseInt(document.getElementById("op-exp-port").value)
  var path = document.getElementById("op-exp-path").value || toHttpPathSample(_selected)
  api("POST", "/channels/" + enc(_selected) + "/expose", { port: port, path: path })
    .then(function() { toast("Exposed on port " + port); refreshAll() })
    .catch(function(e) { toast(e.message, "err") })
}

function doUnexpose() {
  api("POST", "/channels/" + enc(_selected) + "/unexpose", {})
    .then(function() { toast("Unexposed"); refreshAll() })
    .catch(function(e) { toast(e.message, "err") })
}

function doPeer() {
  var port = parseInt(document.getElementById("op-peer-port").value)
  var path = document.getElementById("op-peer-path").value || toHttpPathSample(_selected)
  var urls = document.getElementById("op-peer-urls").value.split(",").map(function(s){return s.trim()}).filter(Boolean)
  api("POST", "/channels/" + enc(_selected) + "/peer", { port: port, path: path, urls: urls })
    .then(function() { toast("Peered with " + urls.length + " remote(s)"); refreshAll() })
    .catch(function(e) { toast(e.message, "err") })
}

function doUnpeer() {
  api("POST", "/channels/" + enc(_selected) + "/unpeer", {})
    .then(function() { toast("Unpeered"); refreshAll() })
    .catch(function(e) { toast(e.message, "err") })
}

function doMirror() {
  var target = document.getElementById("op-mirror-target").value.trim()
  if (!target) { toast("Target channel is required", "err"); return }
  api("POST", "/channels/" + enc(_selected) + "/mirror", { target: target })
    .then(function(r) { toast("Mirror subscriber added (id: " + r.subId + ")") })
    .catch(function(e) { toast(e.message, "err") })
}

function doHousekeep() {
  var max = parseInt(document.getElementById("op-hk-max").value)
  api("POST", "/channels/" + enc(_selected) + "/housekeep", { maxKeys: max })
    .then(function(r) { toast("Housekeep subscriber added") })
    .catch(function(e) { toast(e.message, "err") })

function doBuffer() {
  var target = document.getElementById("op-buf-target").value.trim()
  var idxs   = document.getElementById("op-buf-idxs").value.split(",").map(function(s){return s.trim()}).filter(Boolean)
  var byNum  = parseInt(document.getElementById("op-buf-num").value)
  var byTime = parseInt(document.getElementById("op-buf-time").value)

// ── Live panel ───────────────────────────────────────────────────────────────
function startLive() {
  _liveActive = true
  _liveCount  = 0
  loadLiveStatus()
}

function liveAddEvent(ev) {
  if (!ev || !ev.channel) return
  if (!_liveEvents[ev.channel]) _liveEvents[ev.channel] = []
  _liveEvents[ev.channel].unshift(ev)
  if (_liveEvents[ev.channel].length > 200) _liveEvents[ev.channel].length = 200
}

function renderLive() {
  var openSel = document.getElementById("live-open")
  var subsSel = document.getElementById("live-subs")
  var grid    = document.getElementById("live-grid")
  if (!openSel || !subsSel || !grid) return

  openSel.innerHTML = ""
  _liveState.openChannels.forEach(function(ch) {
    var o = document.createElement("option")
    o.value = ch.name
    o.textContent = ch.name + " [" + ch.type + "]"
    openSel.appendChild(o)
  })

  subsSel.innerHTML = ""
  _liveState.subscribed.forEach(function(s) {
    var o = document.createElement("option")
    o.value = s.name
    o.textContent = s.name + " (#" + s.subId + ")"
    subsSel.appendChild(o)
  })

  grid.innerHTML = ""
  _liveState.subscribed.forEach(function(s) {
    var cell = document.createElement("div")
    cell.className = "live-grid-cell"
    var head = document.createElement("div")
    head.className = "live-grid-head"
    head.textContent = s.name
    var log = document.createElement("div")
    log.className = "live-log"
    var events = _liveEvents[s.name] || []
    if (events.length === 0) {
      var empty = document.createElement("div")
      empty.className = "live-entry"
      empty.innerHTML = '<span class="live-ts">-</span><span class="live-op">idle</span><span class="live-key">No events yet</span>'
      log.appendChild(empty)
    } else {
      events.forEach(function(ev) {
        var entry = document.createElement("div")
        entry.className = "live-entry"
        var ts = new Date(ev.ts).toISOString().replace("T", " ").replace("Z", "").substring(0, 23)
        entry.innerHTML = '<span class="live-ts">' + esc(ts) + '</span>'
          + '<span class="live-op">' + esc(ev.op) + '</span>'
          + '<span class="live-key">' + esc(compactData(ev.key)) + '</span>'
          + '<span class="live-val">' + esc(compactData(ev.val)) + '</span>'
        log.appendChild(entry)
      })
    }
    cell.appendChild(head)
    cell.appendChild(log)
    grid.appendChild(cell)
  })
}

function loadLiveStatus() {
  return api("GET", "/live")
    .then(function(st) {
      _liveState = st || { openChannels: [], subscribed: [] }
      renderLive()
    })
    .catch(function(e) { toast(e.message, "err") })
}

function liveSubscribeSelected() {
  var sel = document.getElementById("live-open")
  if (!sel || !sel.value) { toast("Select an open channel", "err"); return }
  api("POST", "/live/subscribe", { name: sel.value })
    .then(function() { toast("Subscribed: " + sel.value); return loadLiveStatus() })
    .catch(function(e) { toast(e.message, "err") })
}

function liveUnsubscribeSelected() {
  var sel = document.getElementById("live-subs")
  if (!sel || !sel.value) { toast("Select a subscribed channel", "err"); return }
  api("POST", "/live/unsubscribe", { name: sel.value })
    .then(function() { toast("Unsubscribed: " + sel.value); return loadLiveStatus() })
    .catch(function(e) { toast(e.message, "err") })
}

function startSSE() {
  if (_sseSource) _sseSource.close()
  _sseSource = new EventSource("/api/events")
  _sseSource.onmessage = function(e) {
    try {
      var ev = JSON.parse(e.data)
      if (!ev.channel) return
      liveAddEvent(ev)
      _liveCount++
      if (_curTab === "live") renderLive()
    } catch(err) {}
  }
  _sseSource.onerror = function() { _sseSource = null; setTimeout(startSSE, 3000) }
}

function getOptsEditorData() {
  var fieldData = readOptionFields()
  if (_optsEditorMode === "visual") return Object.assign({}, _optsEditorData || {}, fieldData || {})
  var s = ((document.getElementById("mf-opts") || {}).value || "").trim()
  var raw = s.length ? parseDataText(s) : {}
  return Object.assign({}, raw || {}, fieldData || {})
}

function getTypeInfo(type) {
  return _types.find(function(t) { return t.type === type }) || {}
}

function renderTypeInfo(tinfo) {
  if (!tinfo || (!tinfo.desc && !tinfo.odoc && !tinfo.options)) return ""
  var count = tinfo.options ? Object.keys(tinfo.options).length : 0
  var bits = []
  if (tinfo.desc) bits.push(esc(tinfo.desc))
  if (tinfo.odoc) bits.push("odoc: " + esc(tinfo.odoc))
  bits.push(count + " option" + (count === 1 ? "" : "s"))
  return '<div class="type-help">' + bits.join(" · ") + '</div>'
}

function mergeTypeInfo(def, tinfo) {
  var out = Object.assign({}, def)
  if (tinfo && (tinfo.desc || tinfo.odoc || tinfo.options)) {
    out.typeInfo = {
      desc: tinfo.desc,
      odoc: tinfo.odoc,
      options: tinfo.options || {}
    }
  }
  return out
}

function renderOptionFields(tinfo, values) {
  var opts = (tinfo && tinfo.options) || {}
  var names = Object.keys(opts)
  if (names.length === 0) return '<div class="type-help">This channel type has no creation options.</div>'
  var html = '<div class="option-grid">'
  names.forEach(function(name) {
    var spec = opts[name] || {}
    var id = optionFieldId(name)
    var val = Object.prototype.hasOwnProperty.call(values, name) ? values[name] : spec.default
    html += '<div class="option-row">'
    html += '<div class="option-name">' + esc(name) + (spec.required ? ' <span class="req">*</span>' : '') + '</div>'
    html += '<div>' + renderOptionInput(id, spec, val)
    html += '<div class="option-meta">' + esc(spec.type || "string") + (isDefVal(spec.default) ? " · default: " + esc(compactData(spec.default)) : "") + (spec.desc ? " · " + esc(spec.desc) : "") + '</div></div>'
    html += '</div>'
  })
  html += '</div>'
  return html
}

function renderOptionInput(id, spec, val) {
  var type = spec.type || "string"
  if (type === "boolean") return '<select data-opt-field="1" data-opt-type="boolean" id="' + id + '"><option value=""></option><option value="true"' + (val === true ? " selected" : "") + '>true</option><option value="false"' + (val === false ? " selected" : "") + '>false</option></select>'
  if (type === "number") return '<input data-opt-field="1" data-opt-type="number" id="' + id + '" value="' + esc(isDefVal(val) ? val : "") + '" />'
  if (type === "array" || type === "object") return '<input data-opt-field="1" data-opt-type="' + type + '" id="' + id + '" value="' + esc(isDefVal(val) ? compactData(val) : "") + '" placeholder="' + (type === "array" ? "[...]" : "(...)") + '" />'
  if (type === "function") return '<textarea data-opt-field="1" data-opt-type="function" id="' + id + '" placeholder="function(...) { ... }">' + esc(isDefVal(val) ? String(val) : "") + '</textarea>'
  return '<input data-opt-field="1" data-opt-type="string" id="' + id + '" value="' + esc(isDefVal(val) ? val : "") + '" />'
}

function readOptionFields() {
  var out = {}
  Array.prototype.slice.call(document.querySelectorAll("[data-opt-field='1']")).forEach(function(el) {
    var raw = (el.value || "").trim()
    if (raw === "") return
    var name = decodeURIComponent(el.id.replace(/^optf-/, ""))
    var type = el.getAttribute("data-opt-type") || "string"
    if (type === "boolean") out[name] = raw === "true"
    else if (type === "number") out[name] = Number(raw)
    else if (type === "array" || type === "object") out[name] = parseDataText(raw)
    else out[name] = raw
  })
  return out
}

function optionFieldId(name) {
  return "optf-" + encodeURIComponent(name)
}

function isDefVal(v) {
  return v !== undefined && v !== null
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function parseDataText(s) {
  s = String(s || "").trim()
  if (!s) return null
  try { return JSON.parse(s) } catch(jsonErr) {}
  return parseSlon(s)
}

function parseSlon(s) {
  var i = 0
  function err(msg) { throw new Error(msg + " at " + i) }
  function ws() { while (/\s/.test(s.charAt(i))) i++ }
  function ch(c) { ws(); if (s.charAt(i) !== c) err("Expected '" + c + "'"); i++ }
  function value() {
    ws()
    var c = s.charAt(i)
    if (c === "(") return map()
    if (c === "[") return arr()
    if (c === "'" || c === '"') return quoted()
    return atom()
  }
  function map() {
    var out = {}
    ch("("); ws()
    if (s.charAt(i) === ")") { i++; return out }
    while (i < s.length) {
      var k = key()
      ch(":")
      out[k] = value()
      ws()
      if (s.charAt(i) === ",") { i++; continue }
      if (s.charAt(i) === ")") { i++; return out }
      err("Expected ',' or ')'")
    }
    err("Unclosed map")
  }
  function arr() {
    var out = []
    ch("["); ws()
    if (s.charAt(i) === "]") { i++; return out }
    while (i < s.length) {
      out.push(value())
      ws()
      if (s.charAt(i) === "|") { i++; continue }
      if (s.charAt(i) === ",") { i++; continue }
      if (s.charAt(i) === "]") { i++; return out }
      err("Expected '|', ',' or ']'")
    }
    err("Unclosed array")
  }
  function key() {
    ws()
    var c = s.charAt(i)
    if (c === "'" || c === '"') return quoted()
    var start = i
    while (i < s.length && !/[:\s]/.test(s.charAt(i))) i++
    if (i === start) err("Expected key")
    return s.substring(start, i)
  }
  function quoted() {
    var q = s.charAt(i++), out = ""
    while (i < s.length) {
      var c = s.charAt(i++)
      if (c === q) return out
      if (c === "\\") {
        var n = s.charAt(i++)
        if (n === "n") out += "\n"
        else if (n === "r") out += "\r"
        else if (n === "t") out += "\t"
        else out += n
      } else out += c
    }
    err("Unclosed string")
  }
  function atom() {
    var start = i
    while (i < s.length && !/[\s,\|\]\)]/.test(s.charAt(i))) i++
    var raw = s.substring(start, i)
    if (raw === "") err("Expected value")
    if (raw === "true") return true
    if (raw === "false") return false
    if (raw === "null") return null
    if (/^[+-]?(?:\d+\.?\d*|\.\d+)(?:[eE][+-]?\d+)?$/.test(raw)) return Number(raw)
    return raw
  }
  var out = value()
  ws()
  if (i < s.length) err("Unexpected input")
  return out
}

function toSlon(v) {
  if (v === null) return "null"
  if (Array.isArray(v)) return "[" + v.map(function(x) { return toSlon(x) }).join(" | ") + "]"
  if (typeof v === "object") return "(" + Object.keys(v).map(function(k) { return slonKey(k) + ": " + toSlon(v[k]) }).join(", ") + ")"
  if (typeof v === "number" || typeof v === "boolean") return String(v)
  return slonString(String(v))
}

function compactData(v) {
  if (Array.isArray(v) || (v && typeof v === "object")) return toSlon(v)
  return JSON.stringify(v)
}

function flatCell(v) {
  if (v === null) return "null"
  if (v === undefined) return "undefined"
  if (Array.isArray(v) || (v && typeof v === "object")) return toSlon(v)
  return String(v)
}

function flatValueMap(v, fallbackLabel) {
  if (v && typeof v === "object" && !Array.isArray(v)) return v
  var out = {}
  out[fallbackLabel] = v
  return out
}

function renderFlatTable(items, fallbackLabel, which, page, total, includeKeyActions) {
  var union = {}
  items.forEach(function(v) {
    var m = flatValueMap(v, fallbackLabel)
    Object.keys(m).forEach(function(k) { union[k] = true })
  })
  var cols = Object.keys(union)
  var html = '<table><tr><th class="num-cell">#</th>'
  cols.forEach(function(c) { html += '<th>' + esc(c) + '</th>' })
  if (includeKeyActions) html += '<th style="width:60px">Actions</th>'
  html += '</tr>'
  items.forEach(function(v, i) {
    var idx = computeRowNumber(which, i, page, total)
    var m = flatValueMap(v, fallbackLabel)
    html += '<tr><td class="num-cell">' + idx + '</td>'
    cols.forEach(function(c) {
      html += '<td class="val-cell" title="' + esc(flatCell(m[c])) + '">' + esc(flatCell(m[c])) + '</td>'
    })
    if (includeKeyActions) {
      var ks = JSON.stringify(v)
      var kenc = encodeURIComponent(ks)
      html += '<td><button class="btn" style="font-size:10px;padding:1px 5px" onclick="unsetKeyEnc(\'' + kenc + '\')">✕</button></td>'
    }
    html += '</tr>'
  })
  html += '</table>'
  return html
}

function slonKey(k) {
  return /^[^\s:\(\),\[\]\|'"\\]+$/.test(k) ? k : slonString(k)
}

function slonString(s) {
  if (/^[^\s:\(\),\[\]\|'"\\]+$/.test(s) && s !== "true" && s !== "false" && s !== "null" && !/^[+-]?(?:\d+\.?\d*|\.\d+)(?:[eE][+-]?\d+)?$/.test(s)) return s
  return "'" + s.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/\n/g, "\\n").replace(/\r/g, "\\r").replace(/\t/g, "\\t") + "'"
}

function isDarkTheme() {
  return document.documentElement.getAttribute("data-theme") !== "light"
}

function safeVisualData(v) {
  if (Array.isArray(v)) return v.map(safeVisualData)
  if (v && typeof v === "object") {
    var out = {}
    Object.keys(v).forEach(function(k) { out[esc(k)] = safeVisualData(v[k]) })
    return out
  }
  if (typeof v === "string") return esc(v)
  return v
}

function renderDataViewer(data, mode, setter) {
  var tabs = '<div class="format-tabs">' +
    '<button class="btn' + (mode === "json" ? " active" : "") + '" onclick="' + setter + '(\'json\')">JSON</button>' +
    '<button class="btn' + (mode === "slon" ? " active" : "") + '" onclick="' + setter + '(\'slon\')">SLON</button>' +
    '<button class="btn' + (mode === "tree" ? " active" : "") + '" onclick="' + setter + '(\'tree\')">Tree</button>' +
    '<button class="btn' + (mode === "visual" ? " active" : "") + '" onclick="' + setter + '(\'visual\')">Visual</button>' +
    '</div>'
  if (mode === "slon") return tabs + '<pre class="data-pre">' + esc(toSlon(data)) + '</pre>'
  if (mode === "tree") return tabs + '<div class="data-pre tree-pre viewer-full">' + renderAsciiTreeHtml(data) + '</div>'
  if (mode === "visual") return tabs + '<div class="njsmap-host viewer-full">' + renderNJSMap(data) + '</div>'
  return tabs + '<pre class="data-pre">' + esc(JSON.stringify(data, null, 2)) + '</pre>'
}

function renderNJSMap(data) {
  if (typeof nJSMap !== "function") return '<pre class="data-pre">' + esc(JSON.stringify(data, null, 2)) + '</pre>'
  try {
    return nJSMap(safeVisualData(data), void 0, isDarkTheme())
  } catch(e) {
    return '<pre class="data-pre">' + esc(JSON.stringify(data, null, 2)) + '</pre>'
  }
}

function renderAsciiTree(data) {
  var lines = []
  function valStr(v) {
    if (v === null) return "null"
    if (typeof v === "string") return JSON.stringify(v)
    if (typeof v === "number" || typeof v === "boolean") return String(v)
    return ""
  }
  function walk(node, name, prefix, isLast) {
    var branch = prefix ? (isLast ? "└─ " : "├─ ") : ""
    var rowPrefix = prefix ? prefix + branch : ""
    if (node === null || typeof node !== "object") {
      lines.push(rowPrefix + name + ": " + valStr(node))
      return
    }
    if (Array.isArray(node)) {
      lines.push(rowPrefix + name + " [array " + node.length + "]")
      var nextPrefix = prefix + (isLast ? "   " : "│  ")
      node.forEach(function(v, i) {
        walk(v, "[" + i + "]", nextPrefix, i === node.length - 1)
      })
      return
    }
    var ks = Object.keys(node)
    lines.push(rowPrefix + name + " {map " + ks.length + "}")
    var mapPrefix = prefix + (isLast ? "   " : "│  ")
    ks.forEach(function(k, i) {
      walk(node[k], k, mapPrefix, i === ks.length - 1)
    })
  }
  walk(data, "root", "", true)
  return lines.join("\n")
}

function renderAsciiTreeHtml(data) {
  function keyHtml(s) { return '<span class="pt-key">' + esc(s) + '</span>' }
  function valueHtml(v) {
    if (v === null) return '<span class="pt-null">null</span>'
    if (typeof v === "number") return '<span class="pt-num">' + esc(String(v)) + '</span>'
    if (typeof v === "boolean") return '<span class="pt-bool">' + esc(String(v)) + '</span>'
    if (typeof v === "string") return '<span class="pt-str">' + esc(JSON.stringify(v)) + '</span>'
    return '<span class="pt-def">' + esc(String(v)) + '</span>'
  }
  var lines = []
  function walk(node, name, prefix, isLast) {
    var branch = prefix ? (isLast ? "└─ " : "├─ ") : ""
    var rowPrefix = prefix ? (prefix + branch) : ""
    if (node === null || typeof node !== "object") {
      lines.push('<span class="pt-line">' + esc(rowPrefix) + '</span>' + keyHtml(name) + '<span class="pt-sep">: </span>' + valueHtml(node))
      return
    }
    if (Array.isArray(node)) {
      lines.push('<span class="pt-line">' + esc(rowPrefix) + '</span>' + keyHtml(name) + '<span class="pt-sep"> [array ' + node.length + ']</span>')
      var nextPrefix = prefix + (isLast ? "   " : "│  ")
      node.forEach(function(v, i) {
        walk(v, "[" + i + "]", nextPrefix, i === node.length - 1)
      })
      return
    }
    var ks = Object.keys(node)
    lines.push('<span class="pt-line">' + esc(rowPrefix) + '</span>' + keyHtml(name) + '<span class="pt-sep"> {map ' + ks.length + '}</span>')
    var mapPrefix = prefix + (isLast ? "   " : "│  ")
    ks.forEach(function(k, i) {
      walk(node[k], k, mapPrefix, i === ks.length - 1)
    })
  }
  walk(data, "root", "", true)
  return lines.join("\n")
}

function refreshSelectedSize() {
  var subtitle = document.getElementById("ch-subtitle")
  var topSize = document.getElementById("top-selected-size")
  if (!_selected) {
    _selectedSize = null
    if (topSize) topSize.textContent = ""
    return
  }
  api("GET", "/channels/" + enc(_selected) + "/size")
    .then(function(r) {
      applySelectedSize(r.size)
    })
    .catch(function() {
      _selectedSize = null
      if (topSize) topSize.textContent = _selected ? " · " + _selected + " size: n/a" : ""
    })
}

function applySelectedSize(size) {
  _selectedSize = size
  var subtitle = document.getElementById("ch-subtitle")
  var topSize = document.getElementById("top-selected-size")
  var d = _defs.find(function(x) { return x.name === _selected })
  if (d && subtitle) subtitle.textContent = d.type + (d.isOpen ? " · open" : " · closed") + " · size " + size
  if (topSize) topSize.textContent = _selected ? (" · " + _selected + " size: " + size) : ""
}

function renderTreeEditor(id, data, onChange) {
  _treeEditors[id] = { data: data, onChange: onChange }
  document.getElementById(id).innerHTML = renderTreeEditNode(id, [], data, "root")
}

function renderTreeEditNode(id, path, v, name) {
  var p = esc(pathToken(path))
  var html = '<div class="tree-row">'
  html += '<input class="tree-key-in" value="' + esc(name) + '" ' + (path.length ? 'onchange="treeRename(\'' + id + '\',\'' + p + '\',this.value)"' : 'disabled') + ' />'
  html += '<select onchange="treeRetype(\'' + id + '\',\'' + p + '\',this.value)">'
  ;["map","array","string","number","boolean","null"].forEach(function(t) { html += '<option value="' + t + '"' + (valueType(v) === t ? " selected" : "") + '>' + t + '</option>' })
  html += '</select>'
  if (v === null || typeof v !== "object") {
    html += '<input class="tree-val-in" value="' + esc(v === null ? "" : String(v)) + '" onchange="treeSetValue(\'' + id + '\',\'' + p + '\',this.value)" ' + (v === null ? "disabled" : "") + ' />'
  }
  if (path.length) html += '<button class="btn btn-err" onclick="treeRemove(\'' + id + '\',\'' + p + '\')">x</button>'
  html += '</div>'
  if (v && typeof v === "object") {
    var keys = Array.isArray(v) ? v.map(function(_, i) { return i }) : Object.keys(v)
    keys.forEach(function(k) { html += renderTreeEditNode(id, path.concat([k]), v[k], Array.isArray(v) ? "[" + k + "]" : k) })
    html += '<div class="tree-actions"><button class="btn" onclick="treeAdd(\'' + id + '\',\'' + p + '\')">Add</button></div>'
  }
  return html
}

function treeRename(id, p, newKey) {
  var path = parsePathToken(p)
  var ed = _treeEditors[id]
  if (!ed || path.length === 0) return
  var parent = getAt(ed.data, path.slice(0, -1))
  var oldKey = path[path.length - 1]
  if (Array.isArray(parent)) return
  if (!newKey || newKey === oldKey) return
  parent[newKey] = parent[oldKey]
  delete parent[oldKey]
  treeCommit(id)
}

function treeRetype(id, p, type) {
  var ed = _treeEditors[id], path = parsePathToken(p)
  if (!ed) return
  setAt(ed.data, path, defaultForType(type))
  treeCommit(id)
}

function treeSetValue(id, p, raw) {
  var ed = _treeEditors[id], path = parsePathToken(p)
  if (!ed) return
  var cur = getAt(ed.data, path)
  var v = raw
  if (typeof cur === "number") v = Number(raw)
  if (typeof cur === "boolean") v = raw === "true"
  setAt(ed.data, path, v)
  treeCommit(id)
}

function treeAdd(id, p) {
  var ed = _treeEditors[id], path = parsePathToken(p)
  if (!ed) return
  var target = getAt(ed.data, path)
  if (Array.isArray(target)) target.push("")
  else if (target && typeof target === "object") {
    var base = "key", n = 1
    while (Object.prototype.hasOwnProperty.call(target, base + n)) n++
    target[base + n] = ""
  }
  treeCommit(id)
}

function treeRemove(id, p) {
  var ed = _treeEditors[id], path = parsePathToken(p)
  if (!ed || path.length === 0) return
  var parent = getAt(ed.data, path.slice(0, -1))
  var key = path[path.length - 1]
  if (Array.isArray(parent)) parent.splice(Number(key), 1)
  else delete parent[key]
  treeCommit(id)
}

function treeCommit(id) {
  var ed = _treeEditors[id]
  if (!ed) return
  ed.onChange(ed.data)
  renderTreeEditor(id, ed.data, ed.onChange)
}

function getAt(data, path) {
  return path.reduce(function(o, k) { return o[k] }, data)
}

function setAt(data, path, value) {
  if (path.length === 0) {
    var edId = Object.keys(_treeEditors).find(function(id) { return _treeEditors[id].data === data })
    if (edId) _treeEditors[edId].data = value
    return
  }
  getAt(data, path.slice(0, -1))[path[path.length - 1]] = value
}

function pathToken(path) { return encodeURIComponent(JSON.stringify(path)) }
function parsePathToken(p) { return JSON.parse(decodeURIComponent(p)) }

function valueType(v) {
  if (Array.isArray(v)) return "array"
  if (v === null) return "null"
  if (typeof v === "object") return "map"
  return typeof v
}

function defaultForType(t) {
  if (t === "map") return {}
  if (t === "array") return []
  if (t === "number") return 0
  if (t === "boolean") return false
  if (t === "null") return null
  return ""
}

function cloneData(v) {
  return JSON.parse(JSON.stringify(v))
}

function esc(s) {
  if (s === null || s === undefined) return ""
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")
}

function enc(s) { return encodeURIComponent(s) }
</script>
