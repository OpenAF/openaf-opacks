jobs:
- name: CHManager::Init
  exec: |
    args.tests = require("tests/autoTestCHManager.js")

- name: CHManager::BasicLifecycle
  from: CHManager::Init
  to  : oJob Test
  exec: args.func = args.tests.testBasicLifecycle

